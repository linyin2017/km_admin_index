<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网址导航</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100%;
      color: #1e293b;
      background: #e8ecf0;
    }
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    @media (min-width: 720px) {
      .app {
        flex-direction: row;
        height: 100vh;
        max-height: 100vh;
        overflow: hidden;
      }
    }
    /* —— 侧栏：深色、细分割线、克制的选中态 —— */
    .sidebar {
      flex: 0 0 auto;
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: linear-gradient(180deg, #131b26 0%, #0f141c 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }
    @media (min-width: 720px) {
      .sidebar {
        width: 256px;
        max-width: 256px;
        min-height: 100%;
      }
    }
    .sidebar-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 10px 0 8px;
    }
    .sidebar-brand {
      padding: 0 14px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }
    .sidebar-brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #6d5bf5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
    }
    .sidebar-logo svg {
      width: 21px;
      height: 21px;
    }
    .sidebar-logo .icon-shield {
      fill: none;
      stroke: #fff;
      stroke-width: 1.4;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .sidebar-brand h1 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f8fafc;
      letter-spacing: 0.02em;
      line-height: 1.3;
    }
    .sidebar-brand p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 3px;
      line-height: 1.4;
    }
    .sidebar h2.nav-heading {
      font-size: 0.84rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.1em;
      padding: 6px 16px 5px;
    }
    .cat-list {
      list-style: none;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .cat-list button {
      position: relative;
      width: 100%;
      text-align: left;
      padding: 9px 14px 9px 18px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .cat-list button:hover {
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.05);
    }
    .cat-list button[aria-selected="true"] {
      color: #f8fafc;
      font-weight: 600;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset, 0 6px 16px rgba(0, 0, 0, 0.18);
    }
    .cat-list button[aria-selected="true"]::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 2px;
      border-radius: 0 1px 1px 0;
      background: linear-gradient(180deg, #f1f5f9 0%, #a1a1aa 100%);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.25);
    }
    .cat-list button:focus-visible {
      outline: 2px solid rgba(99, 102, 241, 0.5);
      outline-offset: 1px;
    }
    /* —— 主区 —— */
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #e8ecf0;
      padding-top: 12px;
    }
    @media (max-width: 719px) {
      .main { padding-top: 10px; }
    }
    .content-hero {
      flex-shrink: 0;
      margin: 0 16px 12px;
      border-radius: 12px;
      background: linear-gradient(125deg, #5b4ddb 0%, #3b6cff 45%, #2563eb 100%);
      box-shadow: 0 8px 28px rgba(37, 99, 235, 0.25);
      padding: 18px 22px;
      color: #fff;
    }
    @media (max-width: 719px) {
      .content-hero { margin: 0 12px 10px; padding: 16px 18px; }
    }
    .content-hero-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .content-hero-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.5rem;
    }
    .content-hero-text { min-width: 0; }
    .content-hero-title {
      font-size: 1.28rem;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }
    .content-hero-sub {
      font-size: 0.86rem;
      color: rgba(255, 255, 255, 0.88);
      margin-top: 4px;
      line-height: 1.45;
    }
    .content-hero--muted {
      background: linear-gradient(125deg, #64748b 0%, #475569 100%);
      box-shadow: 0 6px 20px rgba(71, 85, 105, 0.2);
    }
    .content-hero--error {
      background: linear-gradient(125deg, #b91c1c 0%, #9f1239 100%);
      box-shadow: 0 6px 20px rgba(185, 28, 28, 0.2);
    }
    .main-inner {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      margin: 0 16px 16px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.04), 0 2px 4px rgba(15, 23, 42, 0.04), 0 12px 32px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(226, 232, 240, 0.9);
      overflow: hidden;
    }
    @media (max-width: 719px) {
      .main-inner { margin: 0 12px 12px; }
    }
    .main-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 719px) {
      .main-inner { overflow: visible; }
      .main-body {
        flex: 1 1 auto;
        min-height: 280px;
        overflow: visible;
      }
    }
    .cards-belt {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 16px 16px 12px;
      position: relative;
      overflow: auto;
      background: #fafbfc;
    }
    .cards-belt.is-state-only .cards { display: none; }
    .cards {
      flex: 1;
      min-height: 0;
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(6, minmax(0, 1fr));
      align-content: stretch;
    }
    @media (min-width: 600px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(3, minmax(0, 1fr));
        gap: 14px 16px;
        min-height: 0;
        height: 100%;
      }
    }
    @media (min-width: 1024px) {
      .cards {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 14px 16px;
      }
    }
    @media (max-width: 599px) {
      .cards { min-height: 360px; }
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      min-height: 0;
      height: 100%;
      max-height: 100%;
      min-width: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .card:hover {
      border-color: #cbd5e1;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.3;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-link-wrap {
      flex-shrink: 0;
      min-width: 0;
      overflow: hidden;
    }
    .card-link {
      display: block;
      font-size: 0.88rem;
      color: #2563eb;
      text-decoration: none;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-link:hover { text-decoration: underline; }
    .card-note {
      font-size: 0.86rem;
      color: #64748b;
      line-height: 1.55;
      flex: 1 1 0;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      word-break: break-word;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      line-clamp: 3;
    }
    .state-msg[hidden] { display: none !important; }
    .cards-belt.is-state-only { flex: 1; min-height: 0; }
    .cards-belt.is-state-only .state-msg {
      flex: 1;
      display: flex !important;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin: 0;
      padding: 32px 16px;
    }
    .pager {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px 20px;
      flex-shrink: 0;
      margin-top: auto;
      padding: 14px 18px 16px 20px;
      border-top: 1px solid #eef2f7;
      background: linear-gradient(180deg, #fafbfc 0%, #fff 100%);
    }
    @media (max-width: 560px) {
      .pager { flex-direction: column; justify-content: center; }
      .pager-meta { text-align: center; width: 100%; }
    }
    .pager-inner {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 0;
    }
    .pager-control {
      padding: 0 14px;
      min-height: 38px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #475569;
      font-size: 0.86rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      border: 1px solid #e2e8f0;
    }
    .pager-control:hover:not(:disabled) {
      color: #4f46e5;
      background: #f5f3ff;
      border-color: #c7d2fe;
      box-shadow: 0 2px 6px rgba(79, 70, 229, 0.12);
    }
    .pager-control:disabled {
      color: #cbd5e1;
      background: #f8fafc;
      border-color: #f1f5f9;
      cursor: not-allowed;
      box-shadow: none;
    }
    .pager-nums {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .pager-num {
      min-width: 38px;
      height: 38px;
      padding: 0 8px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #64748b;
      font-size: 0.88rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .pager-num:hover:not(:disabled) {
      color: #4f46e5;
      background: rgba(99, 102, 241, 0.08);
    }
    .pager-num[aria-current="page"],
    span.pager-num.is-active {
      color: #fff;
      background: linear-gradient(145deg, #6366f1 0%, #4f46e5 100%);
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.35);
      font-weight: 600;
      cursor: default;
    }
    span.pager-num[aria-current="page"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .pager-ellipsis-btn {
      min-width: 40px;
      height: 38px;
      padding: 0 6px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      background: #f8fafc;
      color: #64748b;
      font-size: 1.05rem;
      line-height: 1;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .pager-ellipsis-btn:hover {
      color: #4f46e5;
      background: #eef2ff;
      border-color: #a5b4fc;
      box-shadow: 0 1px 4px rgba(79, 70, 229, 0.12);
    }
    .pager-jump-dlg {
      max-width: 92vw;
      width: 340px;
      border: none;
      border-radius: 14px;
      padding: 0;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.2);
      color: #1e293b;
    }
    .pager-jump-dlg::backdrop {
      background: rgba(15, 23, 42, 0.35);
    }
    .pager-jump-dlg-inner {
      padding: 20px 22px 18px;
    }
    .pager-jump-dlg h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .pager-jump-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 10px;
      font-size: 0.95rem;
    }
    .pager-jump-row input {
      width: 88px;
      padding: 10px 12px;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      text-align: center;
    }
    .pager-jump-row input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .pager-jump-total { color: #64748b; font-size: 0.9rem; }
    .pager-jump-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }
    .pager-jump-actions button {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #475569;
    }
    .pager-jump-actions button.primary {
      border-color: #6366f1;
      background: linear-gradient(145deg, #6366f1, #4f46e5);
      color: #fff;
    }
    .pager-jump-actions button.primary:hover {
      filter: brightness(1.05);
    }
    .pager-meta {
      font-size: 0.84rem;
      color: #64748b;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .pager-meta strong {
      color: #334155;
      font-weight: 600;
    }
    .state-msg { color: #94a3b8; }
    .state-msg.error { color: #b91c1c; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="分类导航">
      <div class="sidebar-inner">
        <div class="sidebar-brand">
          <div class="sidebar-brand-row">
            <div class="sidebar-logo" aria-hidden="true" title="网址导航">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false" aria-hidden="true">
                <path class="icon-shield" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              </svg>
            </div>
            <div>
              <h1>网址导航</h1>
              <p>快速访问各系统入口</p>
            </div>
          </div>
        </div>
        <h2 class="nav-heading">分类</h2>
        <ul class="cat-list" id="cat-list" role="list"></ul>
      </div>
    </aside>
    <main class="main">
      <div class="content-hero" id="content-hero" role="region" aria-label="当前分类">
        <div class="content-hero-inner">
          <div class="content-hero-icon" id="content-hero-icon" aria-hidden="true">📌</div>
          <div class="content-hero-text">
            <h2 class="content-hero-title" id="hero-title">加载中…</h2>
            <p class="content-hero-sub" id="hero-sub">请稍候</p>
          </div>
        </div>
      </div>
      <div class="main-inner">
        <div class="main-body" id="main-body">
          <div class="cards-belt" id="cards-belt">
            <div class="cards" id="cards"></div>
            <div class="state-msg" id="state-msg" hidden></div>
          </div>
          <div class="pager" id="pager" hidden></div>
        </div>
      </div>
    </main>
  </div>
  <dialog class="pager-jump-dlg" id="pager-jump-dialog" aria-labelledby="pager-jump-title">
    <div class="pager-jump-dlg-inner">
      <h3 id="pager-jump-title">跳转到指定页</h3>
      <div class="pager-jump-row">
        <span>第</span>
        <input type="number" id="pager-jump-input" min="1" step="1" inputmode="numeric" />
        <span>页</span>
        <span class="pager-jump-total">/ 共 <span id="pager-jump-max">1</span> 页</span>
      </div>
      <div class="pager-jump-actions">
        <button type="button" id="pager-jump-cancel">取消</button>
        <button type="button" class="primary" id="pager-jump-ok">确定</button>
      </div>
    </div>
  </dialog>
  <script>
    (function () {
      var PAGE_SIZE = 6;
      var DATA_URL = "sites.json";

      var data = [];
      var categoryIndex = 0;
      var page = 1;

      var el = {
        catList: document.getElementById("cat-list"),
        mainBody: document.getElementById("main-body"),
        cardsBelt: document.getElementById("cards-belt"),
        cards: document.getElementById("cards"),
        pager: document.getElementById("pager"),
        hero: document.getElementById("content-hero"),
        heroTitle: document.getElementById("hero-title"),
        heroSub: document.getElementById("hero-sub"),
        stateMsg: document.getElementById("state-msg")
      };

      function setHeroVariant(variant) {
        el.hero.classList.remove("content-hero--muted", "content-hero--error");
        if (variant === "error") el.hero.classList.add("content-hero--error");
        else if (variant === "muted") el.hero.classList.add("content-hero--muted");
      }

      function syncCardsBeltState() {
        if (el.cardsBelt) {
          el.cardsBelt.classList.toggle("is-state-only", !el.stateMsg.hidden);
        }
      }

      function normalizeUrl(raw) {
        var t = String(raw).trim();
        if (!t) return "#";
        if (/^https?:\/\//i.test(t)) return t;
        return "https://" + t;
      }

      function renderCategories() {
        el.catList.innerHTML = "";
        if (!data.length) return;
        data.forEach(function (cat, i) {
          var li = document.createElement("li");
          var btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = cat.name || "（未命名）";
          btn.setAttribute("role", "tab");
          btn.setAttribute("aria-selected", i === categoryIndex ? "true" : "false");
          if (i === categoryIndex) btn.setAttribute("aria-current", "true");
          else btn.removeAttribute("aria-current");
          btn.addEventListener("click", function () {
            categoryIndex = i;
            page = 1;
            renderAll();
            if (el.cardsBelt) el.cardsBelt.scrollTop = 0;
            else el.mainBody.scrollTop = 0;
          });
          li.appendChild(btn);
          el.catList.appendChild(li);
        });
      }

      function currentSites() {
        if (!data[categoryIndex] || !Array.isArray(data[categoryIndex].sites)) {
          return [];
        }
        return data[categoryIndex].sites;
      }

      function renderCards() {
        el.cards.innerHTML = "";
        el.stateMsg.hidden = true;
        el.pager.hidden = true;
        setHeroVariant("");

        var sites = currentSites();
        var catName = (data[categoryIndex] && data[categoryIndex].name) || "";

        if (!data.length) {
          el.heroTitle.textContent = "暂无数据";
          el.heroSub.textContent = "请检查 sites.json 是否可访问。";
          setHeroVariant("error");
          el.stateMsg.textContent = "暂无数据，请检查 sites.json";
          el.stateMsg.className = "state-msg error";
          el.stateMsg.hidden = false;
          syncCardsBeltState();
          return;
        }

        if (sites.length === 0) {
          el.heroTitle.textContent = catName || "空分类";
          el.heroSub.textContent = "该分类下还没有添加网站。";
          setHeroVariant("muted");
          el.stateMsg.textContent = "该分类下暂无网站";
          el.stateMsg.className = "state-msg";
          el.stateMsg.hidden = false;
          syncCardsBeltState();
          return;
        }

        var totalPages = Math.max(1, Math.ceil(sites.length / PAGE_SIZE));
        if (page > totalPages) page = totalPages;
        var start = (page - 1) * PAGE_SIZE;
        var slice = sites.slice(start, start + PAGE_SIZE);

        el.heroTitle.textContent = catName;
        var sub = "共 " + sites.length + " 个站点";
        if (totalPages > 1) {
          sub += " · 第 " + page + " / " + totalPages + " 页";
        }
        el.heroSub.textContent = sub;

        slice.forEach(function (site) {
          var name = site.name != null ? String(site.name) : "";
          var value = site.value != null ? String(site.value) : "";
          var note = site.note != null ? String(site.note) : "";
          var href = normalizeUrl(value);

          var card = document.createElement("article");
          card.className = "card";
          card.innerHTML =
            '<div class="card-title"></div>' +
            '<div class="card-link-wrap"><a class="card-link" rel="noopener noreferrer" target="_blank"></a></div>' +
            (note
              ? '<div class="card-note"></div>'
              : "");

          var titleEl = card.querySelector(".card-title");
          titleEl.textContent = name || "（无标题）";
          titleEl.title = name || "";
          var a = card.querySelector(".card-link");
          a.href = href;
          a.textContent = value || "（无地址）";
          a.title = value || "";
          var noteEl = card.querySelector(".card-note");
          if (noteEl) {
            noteEl.textContent = note;
            noteEl.title = note;
          }

          el.cards.appendChild(card);
        });

        if (sites.length > PAGE_SIZE) {
          el.pager.hidden = false;
          renderPager(totalPages, sites.length);
        }
        el.stateMsg.hidden = true;
        syncCardsBeltState();
      }

      function buildPageItems(current, total) {
        if (total <= 1) {
          return [];
        }
        if (total <= 9) {
          var full = [];
          for (var i = 1; i <= total; i++) {
            full.push({ t: "n", n: i });
          }
          return full;
        }
        var s = new Set();
        s.add(1);
        s.add(total);
        for (var d = -2; d <= 2; d++) {
          var p = current + d;
          if (p >= 1 && p <= total) {
            s.add(p);
          }
        }
        var arr = Array.from(s).sort(function (a, b) {
          return a - b;
        });
        var res = [];
        for (var k = 0; k < arr.length; k++) {
          if (k > 0 && arr[k] - arr[k - 1] > 1) {
            res.push({ t: "e" });
          }
          res.push({ t: "n", n: arr[k] });
        }
        return res;
      }

      function scrollListTop() {
        if (el.cardsBelt) {
          el.cardsBelt.scrollTop = 0;
        } else {
          el.mainBody.scrollTop = 0;
        }
      }

      var jumpDialog, jumpInput, jumpMaxEl, jumpOk, jumpCancel;
      var jumpInited = false;
      function ensureJumpDialog() {
        if (jumpInited) {
          return;
        }
        jumpDialog = document.getElementById("pager-jump-dialog");
        jumpInput = document.getElementById("pager-jump-input");
        jumpMaxEl = document.getElementById("pager-jump-max");
        jumpOk = document.getElementById("pager-jump-ok");
        jumpCancel = document.getElementById("pager-jump-cancel");
        if (!jumpDialog || !jumpInput) {
          return;
        }
        jumpInited = true;
        jumpOk.addEventListener("click", function () {
          var maxP = parseInt(jumpInput.getAttribute("max") || "1", 10);
          if (isNaN(maxP) || maxP < 1) {
            maxP = 1;
          }
          var v = parseInt(String(jumpInput.value).trim(), 10);
          if (isNaN(v)) {
            v = page;
          }
          v = Math.max(1, Math.min(maxP, v));
          if (typeof jumpDialog.close === "function") {
            jumpDialog.close();
          }
          page = v;
          renderAll();
          scrollListTop();
        });
        jumpCancel.addEventListener("click", function () {
          if (typeof jumpDialog.close === "function") {
            jumpDialog.close();
          }
        });
        jumpInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            jumpOk.click();
          }
        });
      }

      function openPagerJumpDialog(totalP) {
        ensureJumpDialog();
        if (!jumpDialog || !jumpInput) {
          return;
        }
        var tp = Math.max(1, totalP | 0);
        jumpInput.setAttribute("min", "1");
        jumpInput.setAttribute("max", String(tp));
        if (jumpMaxEl) {
          jumpMaxEl.textContent = String(tp);
        }
        jumpInput.value = String(page);
        if (typeof jumpDialog.showModal === "function") {
          try {
            jumpDialog.showModal();
          } catch (err) {
            /* ignore */
          }
        }
        setTimeout(function () {
          jumpInput.select();
          jumpInput.focus();
        }, 0);
      }

      function renderPager(totalPages, totalCount) {
        el.pager.innerHTML = "";
        el.pager.setAttribute("role", "navigation");
        el.pager.setAttribute("aria-label", "分页");

        var inner = document.createElement("div");
        inner.className = "pager-inner";

        var prev = document.createElement("button");
        prev.type = "button";
        prev.className = "pager-control";
        prev.textContent = "上一页";
        prev.setAttribute("aria-label", "上一页");
        prev.disabled = page <= 1;
        prev.addEventListener("click", function () {
          if (page > 1) {
            page--;
            renderAll();
            scrollListTop();
          }
        });

        var numsWrap = document.createElement("div");
        numsWrap.className = "pager-nums";
        buildPageItems(page, totalPages).forEach(function (item) {
          if (item.t === "e") {
            var ellb = document.createElement("button");
            ellb.type = "button";
            ellb.className = "pager-ellipsis-btn";
            ellb.textContent = "…";
            ellb.setAttribute("aria-label", "更多页，点击后跳转到指定页");
            ellb.setAttribute("title", "跳转到第…页");
            ellb.addEventListener("click", function (ev) {
              ev.stopPropagation();
              openPagerJumpDialog(totalPages);
            });
            numsWrap.appendChild(ellb);
            return;
          }
          if (item.n === page) {
            var cur = document.createElement("span");
            cur.className = "pager-num is-active";
            cur.setAttribute("aria-current", "page");
            cur.setAttribute("aria-label", "第 " + item.n + " 页，当前页");
            cur.textContent = String(item.n);
            numsWrap.appendChild(cur);
            return;
          }
          var nb = document.createElement("button");
          nb.type = "button";
          nb.className = "pager-num";
          nb.textContent = String(item.n);
          nb.setAttribute("aria-label", "第 " + item.n + " 页");
          (function (pn) {
            nb.addEventListener("click", function () {
              page = pn;
              renderAll();
              scrollListTop();
            });
          })(item.n);
          numsWrap.appendChild(nb);
        });

        var next = document.createElement("button");
        next.type = "button";
        next.className = "pager-control";
        next.textContent = "下一页";
        next.setAttribute("aria-label", "下一页");
        next.disabled = page >= totalPages;
        next.addEventListener("click", function () {
          if (page < totalPages) {
            page++;
            renderAll();
            scrollListTop();
          }
        });

        inner.appendChild(prev);
        inner.appendChild(numsWrap);
        inner.appendChild(next);
        el.pager.appendChild(inner);

        var meta = document.createElement("div");
        meta.className = "pager-meta";
        var s0 = (page - 1) * PAGE_SIZE + 1;
        var e0 = Math.min(page * PAGE_SIZE, totalCount);
        meta.innerHTML = "本页 <strong>" + s0 + "–" + e0 + "</strong> · 共 <strong>" + totalCount + "</strong> 条";
        el.pager.appendChild(meta);
      }

      function renderAll() {
        renderCategories();
        renderCards();
      }

      function load() {
        el.stateMsg.hidden = true;
        el.heroTitle.textContent = "加载中…";
        el.heroSub.textContent = "正在读取 " + DATA_URL;
        setHeroVariant("muted");
        fetch(DATA_URL, { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error("无法加载 " + DATA_URL + "（HTTP " + r.status + "）");
            return r.json();
          })
          .then(function (json) {
            if (!Array.isArray(json)) throw new Error("JSON 根节点必须是数组");
            data = json;
            if (categoryIndex >= data.length) categoryIndex = 0;
            page = 1;
            renderAll();
          })
          .catch(function (err) {
            el.catList.innerHTML = "";
            el.cards.innerHTML = "";
            el.pager.hidden = true;
            el.heroTitle.textContent = "加载失败";
            el.heroSub.textContent = (err && err.message) || "请稍后再试。";
            setHeroVariant("error");
            el.stateMsg.textContent = err.message || "加载失败";
            el.stateMsg.className = "state-msg error";
            el.stateMsg.hidden = false;
            syncCardsBeltState();
            console.error(err);
          });
      }

      document.addEventListener("DOMContentLoaded", load);
    })();
  </script>
</body>
</html>
